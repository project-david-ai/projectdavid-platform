# docker-compose.gpu.yml
#
# GPU convenience overlay — starts both Ollama and vLLM together.
# Equivalent to using --ollama and --vllm simultaneously.
#
# USAGE:
#   pdavid --mode up --gpu
#
# To start only one GPU service:
#   pdavid --mode up --ollama
#   pdavid --mode up --vllm
#
# Or manually:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# REQUIREMENTS:
#   - NVIDIA GPU with drivers installed
#   - NVIDIA Container Toolkit (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)
#   - HF_TOKEN set in .env (for gated model downloads)
#   - HF_CACHE_PATH set in .env (auto-resolved by pdavid on first run)
#
# IMAGE PINNING
# ─────────────
# Pinned: 2026-04-04 | ollama: 0.20.0 | vllm: v0.9.0 | See PINNED_IMAGES.md

services:
  ollama:
    # 0.20.0 — upgrade tag to ollama/ollama:0.20.0 on next bump
    image: ollama/ollama@sha256:0455f166da85b1d07f694c33ba09278ca649603c0611ba8e46272b16eed7fccd
    container_name: ollama
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - my_custom_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vllm:
    # v0.9.0 — upgrade tag to vllm/vllm-openai:v0.9.0 on next bump
    image: vllm/vllm-openai@sha256:d9a5c1c1614c959fde8d2a4d68449db184572528a6055afdd0caf1e66fb51504
    container_name: vllm_server
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - "${HF_CACHE_PATH:-~/.cache/huggingface}:/root/.cache/huggingface"
    ports:
      - "8001:8000"
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-VL-3B-Instruct}
      --dtype float16
      --quantization fp8
      --max-model-len 4096
      --gpu-memory-utilization 0.85
    networks:
      - my_custom_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Override api to point at both real GPU service URLs.
  api:
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - VLLM_BASE_URL=http://vllm_server:8000
    depends_on:
      ollama:
        condition: service_started
      vllm:
        condition: service_started

volumes:
  ollama_data:
