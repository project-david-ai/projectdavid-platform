[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "projectdavid-platform"
version = "1.9.1"
description = "Deployment orchestrator for the Project David / Entities platform"
readme = "README.md"
authors = [
  { name = "Francis Neequaye Armah", email = "francis.neequaye@projectdavid.co.uk" }
]
license = { text = "PolyForm Noncommercial 1.0.0" }
requires-python = ">=3.9"
keywords = ["Entities", "ProjectDavid", "Orchestration", "Docker", "Deployment", "LLM"]

dependencies = [
  "PyYAML>=5.4",
  "python-dotenv>=1.0",
  "typer>=0.9.0",
]

[project.scripts]
# start_orchestration.py now lives inside projectdavid_platform/
pdavid = "projectdavid_platform.start_orchestration:entry_point"

[project.optional-dependencies]
dev = [
  "black>=23.3",
  "isort>=5.12",
  "ruff>=0.4.0",
  "pytest>=7.2",
  "build",
  "twine",
]

# -------------------------------------------------------------------------
# Bundle non-Python assets. start_orchestration.py is a regular Python
# module inside the package so setuptools picks it up automatically —
# only the compose files and ..env.example need explicit declaration.
# -------------------------------------------------------------------------
[tool.setuptools.package-data]
"projectdavid_platform" = [
  "docker-compose.yml",
  "docker-compose.gpu.yml",
  ".env.example",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["projectdavid_platform*"]

[tool.black]
line-length = 100
target-version = ["py39"]

[tool.isort]
profile = "black"

[tool.ruff]
line-length = 100

[tool.semantic_release]
version_source = "tag"
upload_to_pypi = false