[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "entities_orchestration"
version = "1.3.0"
description = "Deployment orchestrator for the Entities platform"
readme = "README.md"
authors = [
  { name = "Francis Neequaye Armah", email = "francis.neequaye@projectdavid.co.uk" }
]
license = { text = "PolyForm Noncommercial 1.0.0" }
requires-python = ">=3.9"
keywords = ["Entities", "Orchestration", "Docker", "Deployment", "LLM"]

dependencies = [
  "PyYAML>=5.4",
  "python-dotenv>=1.0",
  "typer>=0.9.0",
]

[project.scripts]
# Primary CLI entry point — wraps start_orchestration.py::entry_point
entities-dev = "start_orchestration:entry_point"

[project.optional-dependencies]
dev = [
  "black>=23.3",
  "isort>=5.12",
  "ruff>=0.4.0",
  "pytest>=7.2",
  "build",
  "twine",
]

[tool.black]
line-length = 100
target-version = ["py39"]

[tool.isort]
profile = "black"

[tool.ruff]
line-length = 100

[tool.semantic_release]
version_source = "tag"
upload_to_pypi = false