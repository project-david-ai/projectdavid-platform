# docker-compose.vllm.yml
#
# vLLM opt-in overlay — high-throughput GPU inference via vLLM.
# Can be used independently of Ollama.
#
# USAGE:
#   pdavid --mode up --vllm
#
# Or manually:
#   docker compose -f docker-compose.yml -f docker-compose.vllm.yml up -d
#
# REQUIREMENTS:
#   - NVIDIA GPU with drivers installed
#   - NVIDIA Container Toolkit (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)
#   - HF_TOKEN set in .env (for gated model downloads)
#   - HF_CACHE_PATH set in .env (auto-resolved by pdavid on first run)
#
# To set HF_TOKEN after initial setup:
#   pdavid configure --set HF_TOKEN=hf_abc123
#
# IMAGE PINNING
# ─────────────
# Pinned: 2026-04-04 | Stable: v0.9.0 | See PINNED_IMAGES.md

services:
  vllm:
    # v0.9.0 — upgrade tag to vllm/vllm-openai:v0.9.0 on next bump
    image: vllm/vllm-openai@sha256:d9a5c1c1614c959fde8d2a4d68449db184572528a6055afdd0caf1e66fb51504
    container_name: vllm_server
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # HF_TOKEN is optional — stack starts without it but gated model
      # downloads will fail. Set via: pdavid configure --set HF_TOKEN=hf_abc123
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      # HF_CACHE_PATH uses :- fallback to avoid multi-colon parse error in volume syntax.
      # The orchestrator always sets this before starting — fallback only fires if
      # docker compose up is run directly without going through pdavid.
      - "${HF_CACHE_PATH:-~/.cache/huggingface}:/root/.cache/huggingface"
    ports:
      - "8001:8000"
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-VL-3B-Instruct}
      --dtype float16
      --quantization fp8
      --max-model-len 4096
      --gpu-memory-utilization 0.85
    networks:
      - my_custom_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Override api to point at the real vLLM internal URL
  # instead of the localhost stub in the base compose file.
  api:
    environment:
      - VLLM_BASE_URL=http://vllm_server:8000
    depends_on:
      vllm:
        condition: service_started
