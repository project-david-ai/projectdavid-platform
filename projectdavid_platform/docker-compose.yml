# projectdavid_platform/docker-compose.yml
services:
  db:
    image: mysql:8.0
    container_name: my_mysql_cosmic_catalyst
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-default}
      MYSQL_DATABASE: entities_db
      MYSQL_USER: api_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-default}
    volumes:
      - mysql_data:/var/lib/mysql
    # Port 3307 kept for local tooling (DBeaver etc) via SPECIAL_DB_URL.
    # Remove in production if host-level DB access is not needed.
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - my_custom_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_server
    restart: always
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__STORAGE__STORAGE_PATH: "/qdrant/storage"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"
    networks:
      - my_custom_network

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - my_custom_network

  browser:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless_chromium
    restart: always
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - CONNECTION_TIMEOUT=60000
    networks:
      - my_custom_network

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    volumes:
      - ./docker/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-changeme_use_a_real_secret}
    depends_on:
      - redis
    networks:
      - my_custom_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel_collector
    restart: always
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./docker/otel/otel-config.yaml:/etc/otel-config.yaml
    depends_on:
      - jaeger
    networks:
      - my_custom_network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger_ui
    restart: always
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - my_custom_network

  api:
    # Pre-built image from Docker Hub.
    # Always uses :latest — run `pdavid --mode up --pull` to get the newest version.
    # Scripts are baked into the image at /app/src — do NOT mount a local
    # scripts directory over them.
    image: thanosprime/projectdavid-core-api:latest
    container_name: fastapi_cosmic_catalyst
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SANDBOX_SERVER_URL=http://sandbox:8000
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - BROWSER_WS_ENDPOINT=ws://browser:3000
      - DEFAULT_SECRET_KEY=${DEFAULT_SECRET_KEY}
      - SEARXNG_URL=http://searxng:8080
      - OTEL_SERVICE_NAME=api-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      # Ollama and vLLM are GPU-only — localhost stubs used here.
      # Overridden with real internal URLs by the GPU overlays when
      # pdavid --mode up --ollama / --vllm / --gpu is used.
      - OLLAMA_BASE_URL=http://localhost:11434/v1
      - VLLM_BASE_URL=http://localhost:8001
      - SHARED_PATH=/app/shared_data
      - ASSISTANTS_BASE_URL=http://localhost:80
      - DOWNLOAD_BASE_URL=http://localhost:80/v1/files/download
    volumes:
      - ${SHARED_PATH:-./shared_data}:/app/shared_data
    depends_on:
      db:
        condition: service_healthy
      sandbox:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      browser:
        condition: service_started
      searxng:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - my_custom_network

  sandbox:
    # Pre-built image from Docker Hub.
    # Always uses :latest — run `pdavid --mode up --pull` to get the newest version.
    image: thanosprime/projectdavid-core-sandbox:latest
    container_name: sandbox_api
    restart: always
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    devices:
      - /dev/fuse
    volumes:
      - /tmp/sandbox_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - my_custom_network

  samba:
    image: dperson/samba
    container_name: samba_server
    restart: unless-stopped
    environment:
      USERID: ${SAMBA_USERID:-1000}
      GROUPID: ${SAMBA_GROUPID:-1000}
      TZ: UTC
      USER: "samba_user;${SMBCLIENT_PASSWORD:-default}"
      SHARE: "cosmic_share;/samba/share;yes;no;no;samba_user"
      GLOBAL: |
        server min protocol = NT1
        server max protocol = SMB3
    volumes:
      - ${SHARED_PATH:-./shared_data}:/samba/share
    networks:
      - my_custom_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      # Uncomment when TLS certs are available:
      # - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment when TLS certs are available:
      # - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - my_custom_network

volumes:
  mysql_data:
  qdrant_storage:
  redis_data:

networks:
  my_custom_network:
    driver: bridge