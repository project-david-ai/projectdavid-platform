services:

  db:
    image: mysql:8.0
    container_name: my_mysql_cosmic_catalyst
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: entities_db
      MYSQL_USER: api_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - my_custom_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_server
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__STORAGE__STORAGE_PATH: "/qdrant/storage"
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__LOG_LEVEL: "INFO"
    networks:
      - my_custom_network

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - my_custom_network

  browser:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless_chromium
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=10
      - CONNECTION_TIMEOUT=60000
    networks:
      - my_custom_network

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./docker/searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}
    depends_on:
      - redis
    networks:
      - my_custom_network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger_ui
    restart: always
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "14250:14250"
    networks:
      - my_custom_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel_collector
    restart: always
    command: ["--config=/etc/otel-config.yaml"]
    volumes:
      - ./docker/otel/otel-config.yaml:/etc/otel-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
    networks:
      - my_custom_network

  # ---------------------------------------------------------------------------
  # ollama — Local Ollama inference (ai profile only)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - my_custom_network

  training-api:
    # REST API for datasets, training jobs, and model registry.
    # No GPU required. Queries Ray via dashboard HTTP API only.
    # Reachable via nginx: /v1/datasets/ /v1/training-jobs/
    # /v1/fine-tuned-models/ /v1/deployments/ /v1/inference-deployments/
    # /v1/registry/ — no host port mapping needed.
    #
    # HF cache mounted read-only — required for the training-job whitelist
    # check (_is_model_in_hf_cache in training_service.py) which verifies
    # the base model exists in the shared cache before dispatching to the
    # training worker. training-api only reads, never writes.
    image: thanosprime/projectdavid-core-training-api:1.39
    container_name: training_api
    restart: unless-stopped
    profiles: ["training"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - DEFAULT_SECRET_KEY=${DEFAULT_SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - ASSISTANTS_BASE_URL=http://api:80
      - WORKER_API_KEY=${ADMIN_API_KEY}
      - SANDBOX_AUTH_SECRET=${SANDBOX_AUTH_SECRET}
      - SHARED_PATH=/mnt/training_data
      - HF_HOME=/root/.cache/huggingface
      - PYTHONUNBUFFERED=1
    volumes:
      - ${SHARED_PATH:-./shared_data}:/mnt/training_data
      - ${HF_CACHE_PATH:-~/.cache/huggingface}:/root/.cache/huggingface:ro
    depends_on:
      - redis
      - training-worker
    networks:
      - my_custom_network

  # ---------------------------------------------------------------------------
  # training-worker — Fine-tuning job runner
  # Redis queue consumer. No Ray ownership. Depends on inference-worker for
  # Ray Serve deployment of fine-tuned models post-training.
  # Opt-in: docker compose --profile training up
  # ---------------------------------------------------------------------------
  training-worker:
    image: thanosprime/projectdavid-core-training-worker:1.39
    container_name: training_worker
    restart: unless-stopped
    profiles: ["training"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SHARED_PATH=/mnt/training_data
      - HF_HOME=/root/.cache/huggingface
      - HF_CACHE_PATH=/root/.cache/huggingface
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ID=${NODE_ID:-}
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ${SHARED_PATH:-./shared_data}:/mnt/training_data
      - ${HF_CACHE_PATH:-~/.cache/huggingface}:/root/.cache/huggingface
    networks:
      - my_custom_network
    depends_on:
      - redis
    command: ["python", "src/api/training/worker.py"]

  # ---------------------------------------------------------------------------
  # inference-worker — Ray HEAD node
  # Owns the GPU, runs Ray Serve, hosts the InferenceReconciler.
  # All vLLM inference is managed here via Ray Serve deployments.
  # VLLM_BASE_URL on the main api points to this container.
  # Opt-in: docker compose --profile training up
  # ---------------------------------------------------------------------------
  inference-worker:
    image: thanosprime/projectdavid-core-inference-worker:1.39
    container_name: inference_worker
    restart: unless-stopped
    profiles: ["training"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - RAY_DASHBOARD_PORT=${RAY_DASHBOARD_PORT:-8265}
      - RAY_CLIENT_SERVER_PORT=10001
      - SERVE_HTTP_PORT=8000
      - SHARED_PATH=/mnt/training_data
      - HF_HOME=/root/.cache/huggingface
      - HF_CACHE_PATH=/root/.cache/huggingface
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ID=${NODE_ID:-}
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - RAY_IGNORE_VERSION_MISMATCH=1
    ports:
      - "8002:8000"
      - "8265:8265"
      - "10001:10001"
    volumes:
      - ${SHARED_PATH:-./shared_data}:/mnt/training_data
      - ${HF_CACHE_PATH:-~/.cache/huggingface}:/root/.cache/huggingface
    networks:
      - my_custom_network
    depends_on:
      - redis

  api:
    image: thanosprime/projectdavid-core-api:1.39
    container_name: fastapi_cosmic_catalyst
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SANDBOX_SERVER_URL=http://sandbox:8000
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - BROWSER_WS_ENDPOINT=ws://browser:3000
      - DEFAULT_SECRET_KEY=${DEFAULT_SECRET_KEY}
      - SEARXNG_URL=http://searxng:8080
      - OTEL_SERVICE_NAME=api-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - VLLM_BASE_URL=http://inference_worker:8000
      - SHARED_PATH=/app/shared_data
      - ASSISTANTS_BASE_URL=http://api:9000
      - DOWNLOAD_BASE_URL=http://api:9000/v1/files/download
    ports:
      - "9000:9000"
    volumes:
      - ${SHARED_PATH}:/app/shared_data
    depends_on:
      db:
        condition: service_healthy
      sandbox:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      browser:
        condition: service_started
      searxng:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - my_custom_network

  sandbox:
    image: thanosprime/projectdavid-core-sandbox:1.39
    container_name: sandbox_api
    restart: always
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    devices:
      - /dev/fuse
    ports:
      - "8000:8000"
    volumes:
      - /tmp/sandbox_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - my_custom_network

  samba:
    image: dperson/samba
    container_name: samba_server
    restart: unless-stopped
    environment:
      - USERID=1000
      - GROUPID=1000
      - TZ=UTC
      - USER=samba_user;${SMBCLIENT_PASSWORD}
      - SHARE=cosmic_share;/samba/share;yes;no;no;samba_user
      - "GLOBAL=server min protocol = NT1"
    ports:
      - "1139:139"
      - "1445:445"
    volumes:
      - ${SHARED_PATH}:/samba/share
    networks:
      - my_custom_network

  router:
    # Rust request router (pd_router)
    # Sits between nginx and FastAPI. Owns the connection pool for the
    # /v1/completions SSE streaming hot path. Handles concurrent inference
    # requests without Python GIL contention.
    image: thanosprime/projectdavid-core-router:1.39
    container_name: pd_router
    restart: always
    environment:
      - UPSTREAM_URL=http://api:9000
      - LISTEN_PORT=9100
      - LOG_LEVEL=pd_router=info
    depends_on:
      - api
    networks:
      - my_custom_network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - router
    networks:
      - my_custom_network

volumes:
  mysql_data:
  qdrant_storage:
  redis_data:
  ollama_data:

networks:
  my_custom_network:
    driver: bridge
