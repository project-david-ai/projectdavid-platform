name: Lint, Test, Tag, and Publish

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  TEST_PYPI_URL: https://test.pypi.org/legacy/
  PROD_PYPI_URL: https://upload.pypi.org/legacy/

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 🛡️ Job 1: Security & Quality Gate
  # ──────────────────────────────────────────────────────────────────────────
  lint_and_security:
    name: "🧹 Lint & 🛡️ Security"
    runs-on: ubuntu-latest
    steps:
      - name: "🕺 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "🔧 Install Tools"
        run: |
          python -m pip install --upgrade pip
          # Match SDK Gold Standard versions for environment parity
          pip install black==24.1.1 isort==5.13.2 ruff==0.4.0 mypy bandit safety
          pip install types-requests types-aiofiles types-PyYAML
          # Install platform deps so Mypy can trace imports
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e . || true

      - name: ⚫ Black (Format Check)
        run: black --check .

      - name: 🔀 isort (Import Sort Check)
        run: isort --check .

      - name: ✨ Ruff (Logic Linting)
        run: ruff check .

      - name: 🛡️ Mypy (Static Type Analysis)
        run: mypy projectdavid_platform --ignore-missing-imports

      - name: 🛡️ Bandit (Security Analysis)
        run: bandit -r projectdavid_platform -x tests/ -s B101

      - name: 🛡️ Safety (Dependency Scan)
        continue-on-error: true
        run: safety check

  # ──────────────────────────────────────────────────────────────────────────
  # ✅ Job 2: Unit Testing
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: "✅ Test (Py ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint_and_security
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: "📦 Install"
        run: |
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .
      - name: "✅ Run tests"
        run: pytest tests/ --cov=projectdavid_platform --cov-report=term-missing

  # ──────────────────────────────────────────────────────────────────────────
  # 🚀 Job 3: Semantic Release & PyPI Publish
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: "🚀 Tag, Build, and Publish"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - name: "🕺 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "⚙️ Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "🔢 Run Semantic Release"
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install -g semantic-release @semantic-release/git @semantic-release/changelog @semantic-release/exec
          npx semantic-release

      - name: "🏗️ Build Package"
        run: |
          pip install build
          python -m build

      - name: "🧠 Decide Target"
        id: target
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "token_name=PROD_PYPI_TOKEN" >> $GITHUB_OUTPUT
            echo "repo_url=${{ env.PROD_PYPI_URL }}" >> $GITHUB_OUTPUT
          else
            echo "token_name=TEST_PYPI_TOKEN" >> $GITHUB_OUTPUT
            echo "repo_url=${{ env.TEST_PYPI_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: "📦 Publish"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: "__token__"
          password: ${{ secrets[steps.target.outputs.token_name] }}
          repository_url: ${{ steps.target.outputs.repo_url }}
          skip-existing: true
